<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#b8c4ff",
                    "surface-dim": "#0b1326",
                    "surface": "#0b1326",
                    "surface-container": "#171f33",
                    "on-surface-variant": "#c4c5d5",
                    "inverse-primary": "#3755c3",
                    "on-background": "#dae2fd",
                    "on-tertiary-fixed-variant": "#39485a",
                    "on-secondary": "#00354a",
                    "tertiary-container": "#3e4c5e",
                    "outline-variant": "#444653",
                    "surface-container-lowest": "#060e20",
                    "on-tertiary-container": "#adbcd2",
                    "inverse-on-surface": "#283044",
                    "secondary-fixed-dim": "#7bd0ff",
                    "on-error": "#690005",
                    "inverse-surface": "#dae2fd",
                    "on-primary-fixed-variant": "#173bab",
                    "surface-container-low": "#131b2e",
                    "tertiary": "#b9c8de",
                    "secondary": "#7bd0ff",
                    "primary-container": "#1e40af",
                    "on-secondary-fixed": "#001e2c",
                    "secondary-fixed": "#c4e7ff",
                    "secondary-container": "#00a6e0",
                    "on-tertiary": "#233143",
                    "on-error-container": "#ffdad6",
                    "surface-container-highest": "#2d3449",
                    "error-container": "#93000a",
                    "on-primary-fixed": "#001453",
                    "on-tertiary-fixed": "#0d1c2d",
                    "surface-variant": "#2d3449",
                    "outline": "#8e909f",
                    "surface-tint": "#b8c4ff",
                    "primary-fixed-dim": "#b8c4ff",
                    "tertiary-fixed": "#d4e4fa",
                    "background": "#0b1326",
                    "on-primary-container": "#a8b8ff",
                    "on-surface": "#dae2fd",
                    "tertiary-fixed-dim": "#b9c8de",
                    "surface-bright": "#31394d",
                    "on-secondary-fixed-variant": "#004c69",
                    "on-secondary-container": "#00374d",
                    "primary-fixed": "#dde1ff",
                    "on-primary": "#002584",
                    "surface-container-high": "#222a3d",
                    "error": "#ffb4ab"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "lg": "24px",
                    "md": "16px",
                    "xs": "4px",
                    "base": "4px",
                    "sm": "8px",
                    "xl": "40px",
                    "margin-mobile": "16px",
                    "margin-desktop": "32px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "title-md": ["Inter"],
                    "label-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "mono-data": ["JetBrains Mono"],
                    "body-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .inner-glow-active:active {
            box-shadow: inset 0 0 12px 2px rgba(255, 255, 255, 0.2);
        }
        
        /* Vibrant background inspired by Image 8 */
        .vibrant-bg {
            background-color: #0b1326;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253, 100%, 35%, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(300, 100%, 35%, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(200, 100%, 35%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(280, 100%, 35%, 0.4) 0px, transparent 50%),
                linear-gradient(135deg, #0b1326 0%, #1a0b2e 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .light-trails {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .trail {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(184, 196, 255, 0.4), transparent);
            height: 2px;
            width: 300px;
            filter: blur(4px);
            animation: moveTrail 8s linear infinite;
            opacity: 0.5;
        }

        @keyframes moveTrail {
            0% { transform: translateX(-100%) translateY(0) rotate(-15deg); }
            100% { transform: translateX(400%) translateY(100vh) rotate(-15deg); }
        }

        .glass-card {
            background: rgba(23, 31, 51, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .btn-vibrant {
            background: linear-gradient(135deg, #d946ef 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(217, 70, 239, 0.3);
        }

        .btn-vibrant:hover {
            background: linear-gradient(135deg, #e879f9 0%, #a78bfa 100%);
            box-shadow: 0 4px 20px rgba(217, 70, 239, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="text-on-surface font-body-md min-h-screen flex items-center justify-center p-gutter relative overflow-hidden bg-surface-container-lowest">
<!-- Vibrant Background Elements -->
<div class="vibrant-bg"></div>
<div class="light-trails">
<div class="trail" style="top: 20%; left: -10%; animation-delay: 0s;"></div>
<div class="trail" style="top: 50%; left: -20%; animation-delay: 2s; width: 500px; opacity: 0.3;"></div>
<div class="trail" style="top: 80%; left: -15%; animation-delay: 5s;"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col gap-xl relative z-10 p-8 rounded-2xl bg-transparent">
<!-- Branding Section -->
<div class="flex flex-col items-center gap-md text-center">
<div class="w-24 h-24 rounded-2xl bg-black/40 border border-white/10 flex items-center justify-center overflow-hidden shadow-2xl">
<img alt="Wisdom School Logo" class="w-20 h-20 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uh7p7fTw35JPLB7YXBJuq244aLEupCvob0C5hjY1w5czAZl0GIhYOXiHhxeRKwA4smc2G7KMU_1JG7zJO_v1O-Xcy5iwJgPdL5btOMY1kjRUb1vRzjxQ4Z8yyTEefAMF2TTNoUM_6JNSzA84HqoU5uRywyHYHfuHD1u53k70I2jHW-obCRixX_H58TcRkoyL8NNXXiL-t0KiabVxpyGdiNg58afcjM8V4Gagz2eUsV9-2HGLUuFCtTQiQg"/>
</div>
<div class="flex flex-col gap-xs">
<h1 class="font-headline-lg text-headline-lg text-white drop-shadow-md">Wisdom Finance</h1>
<p class="font-body-md text-body-md text-white/70">Institutional Audit &amp; Expense Tracking</p>
</div>
</div>
<!-- Login Card -->
<section class="glass-card rounded-2xl p-lg flex flex-col gap-lg border-t border-l border-white/20">
<div class="flex flex-col gap-xs">
<h2 class="font-title-md text-title-md text-white">Secure Administrator Login</h2>
<p class="font-label-md text-label-md text-primary/80 uppercase tracking-widest font-semibold">Accessing: Institutional Audit Shell</p>
</div>
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-white/60 px-xs" for="email">OFFICIAL EMAIL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-magenta-400 transition-colors">mail</span>
<input class="w-full bg-black/30 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-magenta-500/30 focus:border-magenta-500/50 transition-all font-body-md" id="email" name="email" placeholder="admin@wisdomschool.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-end px-xs">
<label class="font-label-md text-label-md text-white/60" for="password">SECURITY KEY</label>
<a class="font-label-md text-label-md text-magenta-400 hover:text-magenta-300 hover:underline transition-colors" href="#">Forgot Key?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-magenta-400 transition-colors">lock</span>
<input class="w-full bg-black/30 border border-white/10 rounded-lg py-3 pl-12 pr-12 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-magenta-500/30 focus:border-magenta-500/50 transition-all font-body-md" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Session Options -->
<div class="flex items-center gap-sm px-xs mt-sm">
<input class="w-4 h-4 rounded border-white/20 bg-black/40 text-magenta-500 focus:ring-magenta-500/50 focus:ring-offset-0" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-white/60 select-none cursor-pointer" for="remember">Maintain secure session for 24 hours</label>
</div>
<!-- Action Button -->
<button class="mt-md btn-vibrant text-white rounded-lg py-4 font-title-md text-title-md font-bold flex items-center justify-center gap-md active:scale-[0.98] transition-all inner-glow-active" type="submit">
                    Authorize Access
                    <span class="material-symbols-outlined">verified_user</span>
</button>
</form>
</section>
<!-- Footer / Support -->
<footer class="flex flex-col items-center gap-sm">
<div class="flex gap-md">
<a class="font-label-md text-label-md text-white/50 hover:text-white transition-colors" href="#">Security Protocol</a>
<span class="text-white/20 text-xs">•</span>
<a class="font-label-md text-label-md text-white/50 hover:text-white transition-colors" href="#">Privacy Policy</a>
<span class="text-white/20 text-xs">•</span>
<a class="font-label-md text-label-md text-white/50 hover:text-white transition-colors" href="#">Contact Audit IT</a>
</div>
<div class="flex items-center gap-xs mt-xs bg-black/20 px-3 py-1 rounded-full border border-white/5">
<span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.8)]"></span>
<span class="font-mono-data text-[10px] text-white/60 tracking-widest uppercase">System Status: Operational</span>
</div>
</footer>
</main>
</body></html>

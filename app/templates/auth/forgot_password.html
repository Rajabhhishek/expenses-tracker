<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .vibrant-bg {
            background-color: #0b1326;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253, 100%, 35%, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(300, 100%, 35%, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(200, 100%, 35%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(280, 100%, 35%, 0.4) 0px, transparent 50%),
                linear-gradient(135deg, #0b1326 0%, #1a0b2e 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        .glass-card {
            background: rgba(23, 31, 51, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .btn-vibrant {
            background: linear-gradient(135deg, #d946ef 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(217, 70, 239, 0.3);
        }
        .btn-vibrant:hover {
            background: linear-gradient(135deg, #e879f9 0%, #a78bfa 100%);
            transform: translateY(-1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-4 py-8 relative overflow-x-hidden">
    <div class="vibrant-bg"></div>

    <main class="w-full max-w-[440px] flex flex-col gap-6 relative z-10 p-4 md:p-8 rounded-2xl bg-transparent">
        <div class="flex flex-col items-center gap-4 text-center">
            <h1 class="text-3xl font-bold text-white drop-shadow-md">Wisdom Finance</h1>
            <p class="text-gray-400">Account Recovery</p>
        </div>

        <section class="glass-card rounded-2xl p-6 flex flex-col gap-6">
            <div class="flex flex-col gap-2 text-center">
                <h2 class="text-xl font-semibold text-white">Forgot Password</h2>
                <p class="text-sm text-gray-400">Enter your username to receive an OTP.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="flex flex-col gap-2">
                  {% for category, message in messages %}
                    <div class="p-3 rounded-lg text-sm text-center {% if category == 'success' %}bg-green-500/20 border border-green-500/50 text-green-200{% elif category == 'info' %}bg-blue-500/20 border border-blue-500/50 text-blue-200{% else %}bg-red-500/20 border border-red-500/50 text-red-200{% endif %}">
                      {{ message }}
                    </div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form class="flex flex-col gap-4" action="/auth/forgot_password" method="POST">
                <div class="flex flex-col gap-2">
                    <label class="text-xs text-gray-400 uppercase tracking-widest font-semibold ml-2" for="username">USERNAME</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">person</span>
                        <input class="w-full bg-black/30 border border-white/10 rounded-lg py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all" id="username" name="username" placeholder="Enter username" required="" type="text"/>
                    </div>
                </div>

                <button class="mt-4 btn-vibrant text-white rounded-lg py-3 font-bold flex items-center justify-center gap-2" type="submit">
                    Send OTP
                    <span class="material-symbols-outlined">send</span>
                </button>
            </form>
            
            <div class="text-center mt-2">
                <a href="{{ url_for('auth.login') }}" class="text-sm text-purple-400 hover:text-purple-300 transition-colors">Back to Login</a>
            </div>
        </section>
    </main>
</body>
</html>
